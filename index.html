<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive login form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-background">
        <form action="#" class="form-content">
            <label for="#" id="logo">
                <h4>
                    <a href="#">SIGN UP</a>
                </h4>
                <h4>
                    <a href="#">LOG IN</a>
                </h4>
            </label><br><br><br>

            <input type="text" placeholder="enter username" class="username"><br>
            <input type="text" placeholder="enter email address" class="email"><br>
            <input type="password" placeholder="input password" class="password"><br>
            <input type="password" placeholder="confirm password" class="Cpassword"><br><br>
            <div class="confirmation">
                <div>
                    <input type="checkbox">
                </div>
                <div>
                    <p>
                        I agree with terms & conditions
                    </p>
                </div>
            </div><br><br>
            <div class="register">
                <a href="#">REGISTER</a>
            </div>
        </form>
    </div>
</body>

</html>
